<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Torsión — Comparación maciza vs hueca</title>
<style>
/* ── Reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:      #0f1117;
  --surface: #13151f;
  --border:  #2a2a3a;
  --text:    #e0e0e0;
  --muted:   #666;
  --accent:  #e05030;
  --good:    #4ec97a;
  --warn:    #e8a020;
  --bad:     #e05030;
  --panel:   rgba(15,17,23,0.88);
}
html, body { height:100%; width:100%; background:var(--bg); color:var(--text);
  font-family:system-ui,sans-serif; overflow:hidden; }
body { display:flex; flex-direction:column; }

/* ── Header ───────────────────────────────────────────────────────────────── */
#header {
  flex-shrink:0; height:36px;
  display:flex; align-items:center; gap:10px; padding:0 14px;
  background:var(--surface); border-bottom:1px solid var(--border);
}
#header h1 { font-size:13px; font-weight:600; color:#fff; white-space:nowrap; }
#header span { font-size:11px; color:var(--muted); white-space:nowrap; }

/* ── 3D area ─────────────────────────────────────────────────────────────── */
#views {
  flex:1 1 0; min-height:0;
  display:flex; position:relative; background:#1a1a2a;
}
.view { flex:1; position:relative; overflow:hidden; }
.view canvas { display:block; width:100%; height:100%; }
#divider { width:1px; background:var(--border); flex-shrink:0; }

.view-label {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  background:var(--panel); border:1px solid var(--border); border-radius:6px;
  padding:3px 10px; font-size:11px; color:#aaa;
  pointer-events:none; white-space:nowrap; text-align:center;
}
.view-label strong { color:#fff; display:block; font-size:12px; }
.stress-badge {
  position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
  background:var(--panel); border:1px solid var(--border); border-radius:6px;
  padding:3px 10px; font-size:11px; pointer-events:none; white-space:nowrap; text-align:center;
}

/* ── Efficiency panel — centred overlay ──────────────────────────────────── */
#eff {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:var(--panel); border:1px solid #2a3a2a; border-radius:10px;
  padding:10px 16px; pointer-events:none; z-index:20;
  display:flex; flex-direction:column; gap:6px; min-width:160px;
}
.ep-row {
  display:flex; align-items:center; justify-content:space-between; gap:14px;
  padding-bottom:5px; border-bottom:1px solid #1e2e1e;
}
.ep-row:last-child { border-bottom:none; padding-bottom:0; }
.ep-lbl { font-size:10px; color:var(--muted); }
.ep-val { font-size:15px; font-weight:700; min-width:52px; text-align:right; }
.good { color:var(--good); }
.warn { color:var(--warn); }
.bad  { color:var(--bad);  }

/* ── Legend ───────────────────────────────────────────────────────────────── */
#legend {
  position:absolute; top:8px; right:8px;
  background:var(--panel); border:1px solid var(--border); border-radius:8px;
  padding:8px 11px; font-size:10px; color:#999; pointer-events:none; z-index:10;
}
#legend strong { display:block; color:#ddd; margin-bottom:4px; }
#legend .grad { width:100px; height:6px; border-radius:2px; margin:3px 0;
  background:linear-gradient(to right,#1a4a8c,#2a7abf,#3db89a,#e8a020,#c0392b); }
#legend .gl { display:flex; justify-content:space-between; font-size:8px; color:#555; }
#legend .li { display:flex; align-items:center; gap:4px; margin-top:4px; font-size:9px; }
#legend .dot { width:12px; height:2px; border-radius:1px; flex-shrink:0; }
#info { position:absolute; bottom:8px; right:8px; font-size:9px; color:#333;
  pointer-events:none; z-index:10; }

/* ── Bottom panel ─────────────────────────────────────────────────────────── */
#bottom {
  flex-shrink:0;
  background:var(--surface); border-top:1px solid var(--border);
  display:flex; flex-direction:column;
}
#btns {
  display:flex; gap:6px; flex-wrap:wrap; padding:5px 12px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
button {
  font-size:11px; padding:4px 10px; white-space:nowrap;
  background:transparent; border:1px solid #3a3a4a; color:#ccc;
  border-radius:5px; cursor:pointer; transition:background .15s;
}
button:hover { background:#2a2a3a; }
button.active { border-color:var(--accent); color:var(--accent); }

#controls {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:0; padding:7px 14px; align-items:center;
}
.ctrl {
  display:flex; flex-direction:column; gap:3px;
  padding:0 10px 0 0; border-right:1px solid var(--border);
}
.ctrl:last-child { border-right:none; padding-right:0; }
.ctrl label { font-size:10px; color:#888; display:flex; justify-content:space-between; align-items:center; }
.ctrl label span { color:#ccc; font-weight:600; font-size:11px; }
input[type=range] { width:100%; accent-color:var(--accent); height:3px; cursor:pointer; }

/* ── Mobile (≤ 640px) ────────────────────────────────────────────────────── */
@media (max-width:640px) {
  #header { height:30px; }
  #header span { display:none; }

  /* Stack the two bars vertically */
  #views { flex-direction:column; }
  #divider { width:100%; height:1px; }

  /* Smaller bar labels */
  .view-label { font-size:10px; padding:2px 8px; }
  .view-label strong { font-size:11px; }
  .stress-badge { font-size:10px; padding:2px 8px; }

  /* Hide legend & hint on mobile */
  #legend { display:none; }
  #info   { display:none; }

  /* Efficiency panel: top-left corner, compact */
  #eff {
    top:8px; left:8px; transform:none;
    min-width:120px; padding:6px 10px; gap:4px;
  }
  .ep-val { font-size:12px; min-width:40px; }
  .ep-lbl { font-size:9px; }

  /* Bottom: scrollable stack */
  #bottom { overflow-y:auto; max-height:42vh; -webkit-overflow-scrolling:touch; }

  /* Buttons smaller */
  button { font-size:10px; padding:3px 8px; }

  /* 2-column sliders */
  #controls { grid-template-columns:1fr 1fr; gap:6px 10px; padding:6px 10px; }
  .ctrl { border-right:none; padding-right:0; }
}

/* ── Very narrow (≤ 380px) ───────────────────────────────────────────────── */
@media (max-width:380px) {
  #controls { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div id="header">
  <h1>Torsión</h1>
  <span>| Comparación: Barra maciza vs hueca · mismo torque T</span>
</div>

<div id="views">
  <div class="view" id="viewL">
    <canvas id="cL"></canvas>
    <div class="view-label"><strong>MACIZA</strong>Ri = 0 (referencia)</div>
    <div class="stress-badge" id="badgeL">τ<sub>max</sub>: —</div>
  </div>
  <div id="divider"></div>
  <div class="view" id="viewR">
    <canvas id="cR"></canvas>
    <div class="view-label" id="labelR"><strong>HUECA</strong>Ri = 40%·Ro</div>
    <div class="stress-badge" id="badgeR">τ<sub>max</sub>: —</div>
  </div>

  <!-- Efficiency panel — centred overlay between the two bars -->
  <div id="eff">
    <div class="ep-row">
      <span class="ep-lbl">Ahorro material</span>
      <span class="ep-val good" id="ep-weight">—</span>
    </div>
    <div class="ep-row">
      <span class="ep-lbl">Incremento τ<sub>max</sub></span>
      <span class="ep-val warn" id="ep-stress">—</span>
    </div>
    <div class="ep-row">
      <span class="ep-lbl">Eficiencia J/A</span>
      <span class="ep-val good" id="ep-ratio">—</span>
    </div>
  </div>

  <div id="legend">
    <strong>Esfuerzo cortante τ</strong>
    <div class="grad"></div>
    <div class="gl"><span>0</span><span>τ<sub>ref</sub></span><span style="color:#c0392b">τ<sub>max</sub></span></div>
    <div class="li"><div class="dot" style="background:#e8a020"></div>Rejilla deformada</div>
    <div class="li"><div class="dot" style="background:#e05030"></div>Torque T</div>
  </div>
  <div id="info">Arrastrar·Rotar &nbsp;|&nbsp; Scroll·Zoom &nbsp;|&nbsp; 2×clic·Reset</div>
</div>

<div id="bottom">
  <div id="btns">
    <button id="btnAnim" class="active">⏸ Pausar</button>
    <button id="btnGrid" class="active">Ocultar rejilla</button>
    <button id="btnBar"  class="active">Ocultar barra</button>
    <button id="btnSec">Ver secciones</button>
  </div>
  <div id="controls">
    <div class="ctrl">
      <label>Torque T <span id="tLab">10%</span></label>
      <input type="range" id="sldT" min="0" max="100" value="10">
    </div>
    <div class="ctrl">
      <label>Hueco Ri/Ro <span id="wLab">40%</span></label>
      <input type="range" id="sldW" min="0" max="95" value="40">
    </div>
    <div class="ctrl">
      <label>Escala def. <span id="dLab">6×</span></label>
      <input type="range" id="sldD" min="1" max="15" value="6">
    </div>
    <div class="ctrl">
      <label>Rejilla <span id="gLab">12</span></label>
      <input type="range" id="sldG" min="5" max="24" value="12">
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Renderers ────────────────────────────────────────────────────────────────
const canvL = document.getElementById('cL');
const canvR = document.getElementById('cR');
const rendL = new THREE.WebGLRenderer({canvas:canvL, antialias:true});
const rendR = new THREE.WebGLRenderer({canvas:canvR, antialias:true});
[rendL,rendR].forEach(r=>{ r.setPixelRatio(Math.min(devicePixelRatio,2)); r.setClearColor(0x0f1117,1); });

const sceneL=new THREE.Scene(), sceneR=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(38,1,0.01,200);

function addLights(sc){
  sc.add(new THREE.AmbientLight(0xffffff,0.5));
  const d1=new THREE.DirectionalLight(0xffffff,0.7); d1.position.set(5,8,5); sc.add(d1);
  const d2=new THREE.DirectionalLight(0xffffff,0.2); d2.position.set(-5,-4,-4); sc.add(d2);
}
addLights(sceneL); addLights(sceneR);

// ── State ────────────────────────────────────────────────────────────────────
const L=3.4, Ro=0.38, RiL=0;
let RiR=Ro*0.40;
let torque=0.10, defScale=6, gridDensity=12;
let animOn=true, showGrid=true, showBar=true, showSections=false;

// ── Camera orbit ─────────────────────────────────────────────────────────────
const sph={theta:0.65, phi:1.08, r:9.5};
function updateCam(){
  camera.position.set(
    sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
    sph.r*Math.cos(sph.phi),
    sph.r*Math.sin(sph.phi)*Math.cos(sph.theta));
  camera.lookAt(0,0,0);
}
updateCam();

// ── Physics ───────────────────────────────────────────────────────────────────
// J = π/2·(Ro⁴−Ri⁴)  →  we use Ro⁴−Ri⁴ (π/2 cancels in ratios)
function Jp(Ri){ return Math.pow(Ro,4)-Math.pow(Ri,4); }

// τ(r,y) normalised to τ_max of the solid bar with torque=1
// τ_solid_max = T·Ro/J_solid  → at torque=1, r=Ro, Ri=0: factor = 1
function sf(yNorm, r, Ri){
  if(torque<=0.001) return 0;
  return torque * yNorm * (r/Ro) * (Jp(0)/Jp(Ri));
}

const MAX_RAD=18*Math.PI/180;
function tw(yNorm, Ri){
  return torque * yNorm * MAX_RAD * (Jp(0)/Jp(Ri)) * (defScale/6);
}
function def(r, theta, y, Ri){
  const yn=(y+L/2)/L, phi=tw(yn,Ri);
  return new THREE.Vector3(r*Math.cos(theta+phi), y, r*Math.sin(theta+phi));
}

// ── Colormap ─────────────────────────────────────────────────────────────────
const STOPS=[[0,[.10,.29,.55]],[.25,[.17,.48,.75]],[.50,[.24,.72,.60]],[.75,[.91,.63,.13]],[1,[.75,.22,.17]]];
function cm(t){
  t=Math.max(0,Math.min(1,t));
  for(let i=0;i<STOPS.length-1;i++){
    if(t>=STOPS[i][0]&&t<=STOPS[i+1][0]){
      const k=(t-STOPS[i][0])/(STOPS[i+1][0]-STOPS[i][0]);
      const a=STOPS[i][1],b=STOPS[i+1][1];
      return new THREE.Color(a[0]+(b[0]-a[0])*k,a[1]+(b[1]-a[1])*k,a[2]+(b[2]-a[2])*k);
    }
  }
  return new THREE.Color(.75,.22,.17);
}

// ── Materials ─────────────────────────────────────────────────────────────────
const mGrid   = new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.88});
const mFixed  = new THREE.MeshLambertMaterial({color:0x445566,transparent:true,opacity:.88});
const mFixedW = new THREE.MeshBasicMaterial({color:0x334455,wireframe:true,transparent:true,opacity:.3});
const mFixedB = new THREE.MeshBasicMaterial({color:0x334455,transparent:true,opacity:.5});
const mArrow  = new THREE.MeshBasicMaterial({color:0xe05030});
const mArrowF = new THREE.MeshBasicMaterial({color:0xe05030,transparent:true,opacity:.18});
function mkMats(){ return {
  o: new THREE.MeshLambertMaterial({vertexColors:true,transparent:true,opacity:.82}),
  i: new THREE.MeshLambertMaterial({vertexColors:true,transparent:true,opacity:.65,side:THREE.BackSide}),
  c: new THREE.MeshLambertMaterial({vertexColors:true,side:THREE.DoubleSide})
};}
const mL=mkMats(), mR=mkMats();

// ── Builders ──────────────────────────────────────────────────────────────────
const ANG=36, AX=50;

function mkTube(Ri, radius, inv){
  const v=[],c=[],idx=[];
  for(let iy=0;iy<=AX;iy++){
    const y=-L/2+(iy/AX)*L, yn=iy/AX;
    for(let ia=0;ia<=ANG;ia++){
      const p=def(radius,(ia/ANG)*Math.PI*2,y,Ri); v.push(p.x,p.y,p.z);
      const col=cm(sf(yn,radius,Ri)); c.push(col.r,col.g,col.b);
    }
  }
  for(let iy=0;iy<AX;iy++) for(let ia=0;ia<ANG;ia++){
    const a=iy*(ANG+1)+ia,b=a+1,cc=a+ANG+1,d=cc+1;
    inv?idx.push(a,cc,b,b,cc,d):idx.push(a,b,cc,b,d,cc);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(c,3));
  g.setIndex(idx); g.computeVertexNormals(); return g;
}

function mkCap(Ri, yPos, isTop){
  const v=[],c=[],idx=[],nR=10, yn=isTop?1:0, phi=tw(yn,Ri);
  for(let ir=0;ir<=nR;ir++){
    const r=Ri+(Ro-Ri)*(ir/nR);
    for(let ia=0;ia<=ANG;ia++){
      const th=(ia/ANG)*Math.PI*2;
      v.push(r*Math.cos(th+phi),yPos,r*Math.sin(th+phi));
      const col=cm(sf(yn,r,Ri)); c.push(col.r,col.g,col.b);
    }
  }
  for(let ir=0;ir<nR;ir++) for(let ia=0;ia<ANG;ia++){
    const a=ir*(ANG+1)+ia,b=a+1,cc=a+ANG+1,d=cc+1;
    isTop?idx.push(a,b,cc,b,d,cc):idx.push(a,cc,b,b,cc,d);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
  g.setAttribute('color',new THREE.Float32BufferAttribute(c,3));
  g.setIndex(idx); g.computeVertexNormals(); return g;
}

function buildBar(root, Ri, m){
  root.add(new THREE.Mesh(mkTube(Ri,Ro,false), m.o));
  if(Ri>0.005) root.add(new THREE.Mesh(mkTube(Ri,Ri,true), m.i));
  root.add(new THREE.Mesh(mkCap(Ri,-L/2,false), m.c));
  root.add(new THREE.Mesh(mkCap(Ri, L/2,true),  m.c));
}

function buildGrid(root, Ri){
  const N=gridDensity, AXPTS=40, Rg=Ro*1.52;
  function cLine(pts, cfn){
    const pos=[],cols=[];
    pts.forEach((p,i)=>{ pos.push(p.x,p.y,p.z); const col=cfn(i,pts.length); cols.push(col.r,col.g,col.b); });
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    g.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));
    return new THREE.Line(g,mGrid);
  }
  for(let ia=0;ia<N;ia++){
    const th0=(ia/N)*Math.PI*2, pts=[];
    for(let iy=0;iy<=AXPTS;iy++) pts.push(def(Rg,th0,-L/2+(iy/AXPTS)*L,Ri));
    root.add(cLine(pts,(i,n)=>cm(sf(i/(n-1),Ro,Ri))));
  }
  const NR=Math.round(N*1.4);
  for(let iy=0;iy<=NR;iy++){
    const y=-L/2+(iy/NR)*L, yn=(y+L/2)/L, phi=tw(yn,Ri), s=sf(yn,Ro,Ri), pts=[];
    for(let ia=0;ia<=ANG;ia++){
      const th=(ia/ANG)*Math.PI*2;
      pts.push(new THREE.Vector3(Rg*Math.cos(th+phi),y,Rg*Math.sin(th+phi)));
    }
    root.add(cLine(pts,()=>cm(s)));
  }
}

function buildSections(root, Ri){
  for(let s=0;s<=8;s++){
    const y=-L/2+(s/8)*L, yn=s/8, phi=tw(yn,Ri);
    const v=[],c=[],idx=[],nR=12;
    for(let ir=0;ir<=nR;ir++){
      const r=Ri+(Ro-Ri)*(ir/nR);
      for(let ia=0;ia<=ANG;ia++){
        const th=(ia/ANG)*Math.PI*2;
        v.push(r*Math.cos(th+phi),y,r*Math.sin(th+phi));
        const col=cm(sf(yn,r,Ri)); c.push(col.r,col.g,col.b);
      }
    }
    for(let ir=0;ir<nR;ir++) for(let ia=0;ia<ANG;ia++){
      const a=ir*(ANG+1)+ia,b=a+1,cc=a+ANG+1,d=cc+1; idx.push(a,b,cc,b,d,cc);
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
    g.setAttribute('color',new THREE.Float32BufferAttribute(c,3));
    g.setIndex(idx); g.computeVertexNormals();
    root.add(new THREE.Mesh(g,new THREE.MeshLambertMaterial({vertexColors:true,side:THREE.DoubleSide,transparent:true,opacity:.80})));
    const op=[],ip=[];
    for(let ia=0;ia<=ANG;ia++){
      const th=(ia/ANG)*Math.PI*2;
      op.push(new THREE.Vector3(Ro*Math.cos(th+phi),y,Ro*Math.sin(th+phi)));
      ip.push(new THREE.Vector3(Ri*Math.cos(th+phi),y,Ri*Math.sin(th+phi)));
    }
    root.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(op),new THREE.LineBasicMaterial({color:cm(sf(yn,Ro,Ri)),transparent:true,opacity:.9})));
    if(Ri>0.005) root.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(ip),new THREE.LineBasicMaterial({color:cm(sf(yn,Ri,Ri)),transparent:true,opacity:.75})));
  }
}

function buildFixed(root){
  const geo=new THREE.BoxGeometry(1.3,.1,1.3);
  const b=new THREE.Mesh(geo,mFixed); b.position.y=-L/2-.05; root.add(b);
  const w=new THREE.Mesh(geo,mFixedW); w.position.y=-L/2-.05; root.add(w);
  for(let i=-2;i<=2;i++){
    const m=new THREE.Mesh(new THREE.BoxGeometry(.035,.3,.9),mFixedB);
    m.position.set(i*.22,-L/2-.2,0); root.add(m);
  }
}

function buildArrow(root){
  if(torque<=0.001) return;
  const arc=Math.PI*(.55+1.30*torque), Rtor=.64, yOff=L/2+.10;
  const tor=new THREE.Mesh(new THREE.TorusGeometry(Rtor,.028,6,44,arc),mArrow);
  tor.position.y=yOff; tor.rotation.x=Math.PI/2; root.add(tor);
  const cx=Rtor*Math.cos(arc),cz=Rtor*Math.sin(arc);
  const cone=new THREE.Mesh(new THREE.ConeGeometry(.075,.15,10),mArrow);
  cone.position.set(cx,yOff,cz);
  cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),new THREE.Vector3(-Math.sin(arc),0,Math.cos(arc)));
  root.add(cone);
  const ref=new THREE.Mesh(new THREE.TorusGeometry(Rtor,.006,4,32,Math.PI*2),mArrowF);
  ref.position.y=yOff; ref.rotation.x=Math.PI/2; root.add(ref);
}

// ── Scene management ──────────────────────────────────────────────────────────
let rootL=null, rootR=null;
function dispose(root, scene){
  if(!root) return; scene.remove(root);
  root.traverse(o=>{ if(o.geometry) o.geometry.dispose(); });
}

// ── UI update — called every rebuild, independent of torque ──────────────────
function updateUI(){
  // Badges
  const sfL=sf(1,Ro,RiL), sfR=sf(1,Ro,RiR);
  document.getElementById('badgeL').innerHTML=
    `τ<sub>max</sub>: <strong style="color:#e8a020">${Math.round(sfL*100)}%</strong> τ<sub>adm</sub>`;
  const bR=document.getElementById('badgeR');
  const pR=Math.round(sfR*100);
  if(sfR>0.95){
    bR.style.borderColor='#e05030';
    bR.innerHTML=`τ<sub>max</sub>: <strong style="color:#e05030">${pR}% ⚠</strong> τ<sub>adm</sub>`;
  } else {
    bR.style.borderColor='var(--border)';
    bR.innerHTML=`τ<sub>max</sub>: <strong style="color:#e8a020">${pR}%</strong> τ<sub>adm</sub>`;
  }

  // Efficiency panel — uses geometry ratios only (no torque dependency)
  const Js=Jp(RiL), Jh=Jp(RiR);
  const As=Ro*Ro, Ah=Ro*Ro-RiR*RiR;   // proportional areas (π cancels)

  const weightSave     = Math.round((1-Ah/As)*100);        // % material removed
  const stressIncrease = Math.round((Js/Jh-1)*100);        // % τ increase
  const effRatio       = Math.round(((Jh/Ah)/(Js/As))*100); // J/A efficiency

  const wEl=document.getElementById('ep-weight');
  wEl.textContent=`−${weightSave}%`;
  wEl.className='ep-val good';

  const sEl=document.getElementById('ep-stress');
  sEl.textContent=`+${stressIncrease}%`;
  sEl.className=stressIncrease<30?'ep-val warn':'ep-val bad';

  const rEl=document.getElementById('ep-ratio');
  rEl.textContent=`${effRatio}%`;
  rEl.className=effRatio>=100?'ep-val good':'ep-val warn';

  // Right bar label
  const pct=Math.round(RiR/Ro*100);
  document.getElementById('labelR').innerHTML=
    `<strong>HUECA</strong>Ri = ${pct>0?pct+'%·Ro':'0 (maciza)'}`;
}

function rebuild(){
  dispose(rootL,sceneL); dispose(rootR,sceneR);
  rootL=new THREE.Group(); rootR=new THREE.Group();
  if(showBar)      { buildBar(rootL,RiL,mL);      buildBar(rootR,RiR,mR); }
  if(showGrid)     { buildGrid(rootL,RiL);          buildGrid(rootR,RiR); }
  if(showSections) { buildSections(rootL,RiL);      buildSections(rootR,RiR); }
  buildFixed(rootL); buildFixed(rootR);
  buildArrow(rootL); buildArrow(rootR);
  sceneL.add(rootL); sceneR.add(rootR);
  updateUI();
}
rebuild();

// ── Resize ────────────────────────────────────────────────────────────────────
function resize(){
  [canvL,canvR].forEach((cv,i)=>{
    const r=i===0?rendL:rendR;
    r.setSize(cv.clientWidth, cv.clientHeight, false);
  });
  const w=canvL.clientWidth, h=canvL.clientHeight;
  if(w>0&&h>0){ camera.aspect=w/h; camera.updateProjectionMatrix(); }
}
function schedResize(){ setTimeout(resize,60); }
schedResize();
new ResizeObserver(schedResize).observe(document.getElementById('views'));

// ── Orbit ────────────────────────────────────────────────────────────────────
let drag=false, prev={x:0,y:0};
const viewsEl=document.getElementById('views');
viewsEl.addEventListener('mousedown',  e=>{ drag=true; prev={x:e.clientX,y:e.clientY}; });
viewsEl.addEventListener('touchstart', e=>{ drag=true; prev={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{passive:true});
window.addEventListener('mouseup',  ()=>drag=false);
window.addEventListener('touchend', ()=>drag=false);
function orbit(dx,dy){
  sph.theta-=dx*.006;
  sph.phi=Math.max(.12,Math.min(Math.PI-.12,sph.phi+dy*.006));
  updateCam();
}
viewsEl.addEventListener('mousemove', e=>{ if(!drag)return; orbit(e.clientX-prev.x,e.clientY-prev.y); prev={x:e.clientX,y:e.clientY}; });
viewsEl.addEventListener('touchmove', e=>{ if(!drag)return; orbit(e.touches[0].clientX-prev.x,e.touches[0].clientY-prev.y); prev={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{passive:true});
viewsEl.addEventListener('wheel',  e=>{ sph.r=Math.max(3,Math.min(22,sph.r+e.deltaY*.015)); updateCam(); e.preventDefault(); },{passive:false});
viewsEl.addEventListener('dblclick',()=>{ sph.theta=.65;sph.phi=1.08;sph.r=9.5;updateCam(); });

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('sldT').addEventListener('input',function(){
  torque=this.value/100; document.getElementById('tLab').textContent=this.value+'%'; rebuild();
});
document.getElementById('sldW').addEventListener('input',function(){
  const p=+this.value; RiR=Ro*(p/100);
  document.getElementById('wLab').textContent=p+'%'; rebuild();
});
document.getElementById('sldD').addEventListener('input',function(){
  defScale=+this.value; document.getElementById('dLab').textContent=this.value+'×'; rebuild();
});
document.getElementById('sldG').addEventListener('input',function(){
  gridDensity=+this.value; document.getElementById('gLab').textContent=this.value; rebuild();
});
document.getElementById('btnAnim').addEventListener('click',function(){
  animOn=!animOn; this.textContent=animOn?'⏸ Pausar':'▶ Animar'; this.classList.toggle('active',animOn);
});
document.getElementById('btnGrid').addEventListener('click',function(){
  showGrid=!showGrid; this.textContent=showGrid?'Ocultar rejilla':'Mostrar rejilla';
  this.classList.toggle('active',showGrid); rebuild();
});
document.getElementById('btnBar').addEventListener('click',function(){
  showBar=!showBar; this.textContent=showBar?'Ocultar barra':'Mostrar barra';
  this.classList.toggle('active',showBar); rebuild();
});
document.getElementById('btnSec').addEventListener('click',function(){
  showSections=!showSections; this.textContent=showSections?'Ocultar secciones':'Ver secciones';
  this.classList.toggle('active',showSections); rebuild();
});

// ── Render loop ───────────────────────────────────────────────────────────────
(function loop(){
  requestAnimationFrame(loop);
  if(animOn){ sph.theta+=.0025; updateCam(); }
  rendL.render(sceneL,camera);
  rendR.render(sceneR,camera);
})();
</script>
</body>
</html>
